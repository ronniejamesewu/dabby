<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOC Mockup</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green-dark: #2D5A3D;
  --green-mid: #4A7C59;
  --green-light: #F0F7F2;
  --grey-text: #555555;
  --grey-light: #888888;
  --grey-bg: #F5F5F5;
  --border: #CCCCCC;
  --page-pad: 1.25rem;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #FAFAFA;
  padding: 0.75rem;
}
.doc {
  max-width: 780px;
  margin: 0 auto;
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  overflow: hidden;
}
.section {
  padding: 1.5rem var(--page-pad);
}
.section-header {
  background: var(--green-light);
  margin: 0 calc(-1 * var(--page-pad)) 1.5rem;
  padding: 0.85rem var(--page-pad);
  border-bottom: 3px solid var(--green-mid);
}
.section-header h2 {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--green-dark);
}

/* Reference */
.toc-ref {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding-bottom: 1.1rem;
  margin-bottom: 0.25rem;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.toc-ref-label {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--grey-light);
}
.toc-ref a {
  font-size: 0.8rem;
  color: var(--grey-text);
  text-decoration: none;
  border-bottom: 1px solid var(--border);
  padding-bottom: 1px;
}
.toc-ref a:hover { color: var(--green-dark); border-bottom-color: var(--green-dark); }

/* Strain rows */
.toc-strain-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  padding: 0.8rem 0;
  border-bottom: 1px solid #f0f0f0;
  min-height: 52px;
}
.toc-strain-row:last-child { border-bottom: none; }

.toc-strain-name {
  font-weight: 600;
  font-size: 0.95rem;
  color: var(--green-dark);
  text-decoration: none;
  flex: 1;
  line-height: 1.3;
}
.toc-strain-name:hover { text-decoration: underline; }

.toc-next {
  display: inline-block;
  padding: 0.3rem 0.85rem;
  background: var(--green-dark);
  border-radius: 20px;
  font-size: 0.78rem;
  color: #fff;
  text-decoration: none;
  font-weight: 500;
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.01em;
}
.toc-next:hover { background: var(--green-mid); }

@media (min-width: 600px) {
  :root { --page-pad: 2rem; }
  body { padding: 1rem; }
}
</style>
</head>
<body>
<div class="doc">
<div class="section">
  <div class="section-header"><h2>Contents</h2></div>

  <div class="toc-ref">
    <span class="toc-ref-label">Reference</span>
    <a href="#constants">Constants</a>
    <a href="#swab">Swab Reference</a>
    <a href="#baseline">Baseline Curve</a>
  </div>

  <div class="toc-strains">
    <div class="toc-strain-row">
      <a href="#wwz-profile" class="toc-strain-name">WW Z</a>
      <a href="#wwz-next" class="toc-next">&rarr; Next</a>
    </div>
    <div class="toc-strain-row">
      <a href="#cag-profile" class="toc-strain-name">Caramel Apple Gelato</a>
      <a href="#cag-next" class="toc-next">&rarr; Next</a>
    </div>
    <div class="toc-strain-row">
      <a href="#oc-profile" class="toc-strain-name">Orange Candy</a>
      <a href="#oc-next" class="toc-next">&rarr; Next</a>
    </div>
    <div class="toc-strain-row">
      <a href="#hive1-profile" class="toc-strain-name">The Hive #1</a>
      <a href="#hive1-next" class="toc-next">&rarr; Next</a>
    </div>
    <div class="toc-strain-row">
      <a href="#fembot3-profile" class="toc-strain-name">Fembot #3</a>
      <a href="#fembot3-next" class="toc-next">&rarr; Next</a>
    </div>
    <div class="toc-strain-row">
      <a href="#ms23-profile" class="toc-strain-name">Mango Starburst #23</a>
      <a href="#ms23-next" class="toc-next">&rarr; Next</a>
    </div>
  </div>

</div>
</div>
</body>
</html>
